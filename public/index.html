<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>En Una Nota</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="host">
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Juego de fiesta con Spotify Premium</p>
          <div class="brand-title">
            <img src="./logo.png" alt="" aria-hidden="true">
            <h1>En Una Nota</h1>
          </div>
        </div>
        <div class="spotify-bar">
          <div class="connection-pill">
            <div class="status disconnected" id="spotifyStatus" title="Spotify sin conectar" aria-label="Spotify sin conectar">&#10005;</div>
            <span id="spotifyStatusText">Spotify sin conectar</span>
          </div>
          <button id="connectSpotify" class="primary">Conectar Spotify</button>
          <button id="disconnectSpotify" type="button">Desconectar</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel setup-panel">
          <h2>Playlist</h2>
          <input id="clientId" type="hidden">
          <input id="roomId" type="hidden" value="default">
          <div class="playlist-picker">
            <div class="picker-head">
              <span>Tus playlists</span>
              <button id="refreshPlaylists" type="button">Actualizar</button>
            </div>
            <div id="playlistGrid" class="playlist-grid">
              <p class="muted">Conecta Spotify para ver tus playlists.</p>
            </div>
          </div>
          <div class="join-box">
            <span>Jugadores</span>
            <strong id="joinUrl" class="visually-hidden">Abre /player</strong>
            <img id="joinQr" alt="QR para unir buzzers" src="">
          </div>
          <button id="resetGame" class="danger">Reiniciar juego</button>
        </aside>

        <section class="stage">
          <div class="now-playing" id="answerPanel">
            <img id="cover" alt="" src="">
            <div class="track-copy">
              <p id="roundLabel">Playlist</p>
              <h2 id="trackTitle">Cancion</h2>
              <p id="trackArtist">Artista</p>
            </div>
          </div>
          <div class="round-meter">
            <span id="roundTimer">--</span>
            <div class="meter-track"><span id="roundProgress"></span></div>
          </div>
          <div class="controls">
            <button id="playRound" class="huge">Reproducir</button>
            <button id="replayRound">Repetir</button>
            <button id="revealAnswer">Mostrar</button>
            <button id="continueSong">Continuar</button>
            <button id="goldenGoal">Gol de Oro</button>
          </div>
        </section>

        <aside class="panel score-panel">
          <div class="buzz-board">
            <h2>Orden de respuesta</h2>
            <ol id="buzzList"></ol>
            <button id="clearBuzzes">Limpiar buzzers</button>
          </div>
          <div class="score-head">
            <h2>Puntajes</h2>
            <div id="scoreboard" class="scoreboard"></div>
          </div>
        </aside>
      </section>
    </main>
    <div class="winner-modal hidden" id="winnerModal" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
      <div class="winner-card">
        <p>Ganador</p>
        <h2 id="winnerTitle">Jugador</h2>
        <span id="winnerScore">0 pts</span>
        <button id="closeWinnerModal" type="button">Cerrar</button>
      </div>
    </div>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="./host.js" type="module"></script>
  </body>
</html>
