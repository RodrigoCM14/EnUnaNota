<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>En Una Nota</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="host">
    <main class="shell">
      <section class="topbar">
        <div>
          <p class="eyebrow">Juego de fiesta con Spotify Premium</p>
          <h1>En Una Nota</h1>
        </div>
        <div class="spotify-bar">
          <div class="connection-pill">
            <div class="status disconnected" id="spotifyStatus" title="Spotify sin conectar" aria-label="Spotify sin conectar">×</div>
            <span id="spotifyStatusText">Spotify sin conectar</span>
          </div>
          <button id="connectSpotify" class="primary">Conectar Spotify</button>
          <button id="activateScreenPlayer" type="button">Activar reproductor</button>
          <button id="disconnectSpotify" type="button">Desconectar</button>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel setup-panel">
          <h2>Configuracion</h2>
          <input id="clientId" type="hidden">
          <input id="roomId" type="hidden" value="default">
          <label>
            Playlist de Spotify
            <input id="playlistUrl" autocomplete="off" placeholder="https://open.spotify.com/playlist/...">
          </label>
          <label>
            Segundos
            <input id="clipSeconds" type="number" min="1" max="20" value="10">
          </label>
          <button id="loadPlaylist">Cargar playlist</button>
          <div class="join-box">
            <span>Jugadores</span>
            <strong id="joinUrl">Abre /player</strong>
            <button id="copyJoinUrl" type="button">Copiar enlace</button>
          </div>
        </aside>

        <section class="stage">
          <div class="now-playing hidden" id="answerPanel">
            <img id="cover" alt="" src="">
            <div>
              <p id="roundLabel">Ronda lista</p>
              <h2 id="trackTitle">Carga una playlist y empieza</h2>
              <p id="trackArtist">La cancion se ocultara durante el fragmento.</p>
            </div>
          </div>
          <div class="round-meter">
            <span id="roundTimer">--</span>
            <div class="meter-track"><span id="roundProgress"></span></div>
          </div>
          <div class="controls">
            <button id="playRound" class="huge">Reproducir cancion aleatoria</button>
            <button id="replayRound">Repetir fragmento</button>
            <button id="revealAnswer">Mostrar respuesta</button>
            <button id="clearBuzzes">Limpiar buzzers</button>
          </div>
        </section>

        <aside class="panel score-panel">
          <div class="score-head">
            <h2>Puntajes</h2>
            <div id="scoreboard" class="scoreboard"></div>
          </div>
          <div class="buzz-board">
            <h2>Jugadores</h2>
            <ol id="buzzList"></ol>
          </div>
          <button id="resetGame" class="danger">Reiniciar juego</button>
        </aside>
      </section>
    </main>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="./host.js" type="module"></script>
  </body>
</html>
