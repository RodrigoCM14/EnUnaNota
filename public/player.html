<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Buzzer - En Una Nota</title>
    <link rel="icon" href="./favicon.ico" sizes="any">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="player">
    <main class="phone">
      <section id="joinScreen" class="join-screen">
        <img class="player-logo" src="./logo.png" alt="En Una Nota">
        <h1>Tu buzzer</h1>
        <label>
          Nombre
          <input id="playerName" maxlength="24" autocomplete="name" placeholder="Tu nombre">
        </label>
        <label>
          Clave host <span class="optional-label">opcional</span>
          <input id="adminKey" inputmode="numeric" autocomplete="off" placeholder="Solo para host">
        </label>
        <p id="joinError" class="join-error"></p>
        <button id="joinGame" class="primary">Entrar</button>
      </section>

      <section id="buzzerScreen" class="buzzer-screen hidden">
        <div class="player-head">
          <div>
            <p id="hello">Listo</p>
            <h1 id="playerScore">0 pts</h1>
          </div>
          <span id="rank">-</span>
        </div>
        <button id="buzzButton" class="buzzer">BUZZ</button>
        <p id="roundState" class="round-state">Sin ronda activa</p>
        <p id="buzzState">Espera la cancion...</p>
        <section id="adminControls" class="admin-controls hidden">
          <h2>Controles host</h2>
          <div class="admin-round-controls">
            <button data-host-action="play-round">Reproducir</button>
            <button data-host-action="replay-round">Repetir</button>
            <button data-host-action="reveal-answer">Mostrar</button>
            <button data-host-action="continue-song">Continuar</button>
            <button data-host-action="play-full-song">Completa</button>
            <button data-host-action="golden-goal">Buzz de Oro</button>
            <button data-host-action="clear-buzzes">Limpiar</button>
          </div>
          <div id="adminPlayerControls" class="admin-player-controls"></div>
          <button class="danger" data-host-action="reset-game">Reiniciar juego</button>
          <p id="adminStatus" class="admin-status"></p>
        </section>
      </section>
    </main>
    <script src="./player.js" type="module"></script>
  </body>
</html>
